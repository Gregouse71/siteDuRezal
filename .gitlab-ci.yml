stages:
  - build
  - deploy

pages:
  stage: deploy
  script:
    - echo "export const BACKEND_BASE_URL = 'https://www.rezal-mdm.com/api';" > frontend/src/base_url.js
    - /usr/bin/rsync -e 'ssh -p 2223' -atv --delete --exclude 'upload' --exclude '*__pycache__*' --exclude 'frontend/node_modules' --exclude '.git' . rezal@10.100.1.80:/
    - /usr/bin/ssh -p 2223 rezal@10.100.1.80 'update-site'


  rules:
    - if: $CI_COMMIT_BRANCH == "prod"

build-front:
  stage: build #Actually it does not build for now, it only lints
  tags: ["docker"]
  image: node
  script:
    - cd frontend
    - npm ci
    - npm --offline exec -- eslint .
    - npm --offline exec -- prettier --ignore-path ../.gitignore --check .

build-back:
  stage: build #En fait il fait que linter aussi
  tags: ["docker"]
  image: anaconda/miniconda
  variables:
    #conda a des term of service a accepter
    #Mais si, vous l'avez fait en installant conda. Bah la faut le faire aussi
    CONDA_PLUGINS_AUTO_ACCEPT_TOS: "true" 
  script:
    - cd backend
    - conda env create --file environment.yml
    - conda run -n site_rezal -- ruff check 